- name: Create .config/Code/User directory # noqa: risky-file-permissions Setting permissions breaks this folder somehow
  become: false
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.config/Code/User"
    state: directory

- name: Configure VS Code appearance (settings.json)
  when: ansible_system == 'Linux'
  ansible.builtin.copy:
    src: settings.json
    dest: "{{ lookup('env', 'HOME') }}/.config/Code/User/settings.json"
    owner: "{{ lookup('env', 'USER') }}"
    group: "{{ lookup('env', 'USER') }}"
    mode: '0644'

- name: Configure VS Code keyboard shortcut
  when: ansible_system == 'Linux'
  ansible.builtin.copy:
    src: keybindings.json
    dest: "{{ lookup('env', 'HOME') }}/.config/Code/User/keybindings.json"
    owner: "{{ lookup('env', 'USER') }}"
    group: "{{ lookup('env', 'USER') }}"
    mode: '0644'

- name: Get currently installed vscode extensions
  ansible.builtin.command: 'code --list-extensions'
  register: code_extensions
  changed_when: false

- name: Install VS Code vim
  ansible.builtin.command: "code --install-extension {{ item }}"
  with_items:
    - vscodevim.vim
  when: "'vim' not in code_extensions.stdout"
  changed_when: "'vim' not in code_extensions.stdout"

- name: Install VS Code python extensions
  ansible.builtin.command: "code --install-extension {{ item }}"
  with_items:
    - ms-python.python
    - ms-python.debugpy
    - ms-python.vscode-pylance
  when: "'ms-python.python' not in code_extensions.stdout"
  changed_when: "'ms-python.python' not in code_extensions.stdout"

- name: Install VS Code remote extensions
  ansible.builtin.command: "code --install-extension {{ item }}"
  with_items:
    - ms-vscode-remote.remote-ssh
    - ms-vscode-remote.remote-ssh-edit
    - ms-vscode.remote-explorer
  when: "'ms-vscode-remote.remote-ssh' not in code_extensions.stdout"
  changed_when: "'ms-vscode-remote.remote-ssh' not in code_extensions.stdout"

- name: Install VS Code colored CSV extension
  ansible.builtin.command: "code --install-extension {{ item }}"
  with_items:
    - mechatroner.rainbow-csv
  when: "'mechatroner.rainbow-csv' not in code_extensions.stdout"
  changed_when: "'mechatroner.rainbow-csv' not in code_extensions.stdout"
